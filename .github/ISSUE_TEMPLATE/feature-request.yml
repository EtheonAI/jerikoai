name: Feature Request
description: Suggest a new feature or improvement for Jeriko
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of Jeriko does this relate to?
      options:
        - CLI / Terminal UI
        - Daemon / Server
        - Agent / AI capabilities
        - Channels (Telegram, Slack, Discord, WhatsApp)
        - Connectors (GitHub, Stripe, etc.)
        - Triggers (cron, webhooks, file, HTTP)
        - Skills system
        - Web development templates
        - Install / Setup
        - Configuration
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: |
        Describe the problem you're trying to solve or the workflow you want to improve.
        Focus on the "why" — what are you trying to accomplish?
      placeholder: "I want to be able to..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: |
        Describe how you'd like this feature to work. Include command examples,
        configuration snippets, or UI mockups if applicable.
      placeholder: |
        ```bash
        jeriko my-feature --flag value
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: |
        Have you considered any alternative solutions or workarounds?
        Describe what you've tried or thought about.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: |
        Any other context, screenshots, references to similar tools, or information
        that might help us understand and prioritize this request.
